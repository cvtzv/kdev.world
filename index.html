<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.cvt rflvv – Main.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(96, 165, 250, 0.5);
            border-radius: 4px;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .spiral {
            position: absolute;
            border: 2px solid rgba(96, 165, 250, 0.05);
            border-radius: 50%;
            animation: rotate 30s linear infinite;
            will-change: transform;
        }

        .spiral:nth-child(1) {
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
        }

        .spiral:nth-child(2) {
            top: -25%;
            left: -25%;
            width: 150%;
            height: 150%;
            animation-direction: reverse;
            animation-duration: 35s;
        }

        .floating-light {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #60a5fa;
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0.2;
            will-change: transform;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #60a5fa;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #e2e8f0;
            text-decoration: none;
            transition: color 0.3s ease;
            padding: 5px 0;
        }

        .nav-links a:hover {
            color: #60a5fa;
        }

        .me {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 80px 0;
        }

        .me-content {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .me-text {
            flex: 1;
        }

        .me-text h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 20px;
            color: #fff;
        }

        .highlight {
            color: #60a5fa;
            display: inline-block;
        }

        .avatar-container {
            position: relative;
            width: min(300px, 80vw);
            height: min(300px, 80vw);
            border-radius: 50%;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid rgba(96, 165, 250, 0.3);
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.2);
            animation: pulseGlow 3s ease-in-out infinite;
            will-change: transform, box-shadow;
        }

        @keyframes pulseGlow {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(96, 165, 250, 0.2);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px rgba(96, 165, 250, 0.4);
            }
        }

        .projects-section {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid rgba(96, 165, 250, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .project-card {
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .contact-section {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid rgba(96, 165, 250, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .contact-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .contact-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .contact-button:hover {
            transform: translateY(-5px);
            background: rgba(96, 165, 250, 0.2);
        }

        .contact-button i {
            font-size: 24px;
            color: #60a5fa;
            margin-bottom: 10px;
        }

        .section {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            padding: 80px 0;
        }

        .section.active {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin-bottom: 30px;
            text-align: center;
            color: #fff;
        }

        @media (max-width: 768px) {
            .me-content {
                flex-direction: column-reverse;
                text-align: center;
                gap: 30px;
            }

            .nav-links {
                display: none;
            }

            .section {
                padding: 60px 0;
            }

            .contact-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="spiral"></div>
        <div class="spiral"></div>
    </div>

    <nav>
        <div class="container nav-content">
            <div class="logo">kdev.world</div>
            <div class="nav-links">
                <a href="#home">Главная</a>
                <a href="#projects">Проекты</a>
                <a href="#contact">Контакты</a>
            </div>
        </div>
    </nav>

    <section id="home" class="me">
        <div class="container">
            <div class="me-content">
                <div class="me-text">
                    <h1>Привет, я <span class="highlight">cvt rflvv</span></h1>
                    <p>Добро пожаловать на мою сайт визитку</p>
                </div>
                <div class="avatar-container">
                    <img src="/img/profile.jpg" alt="Аватар" class="avatar">
                </div>
            </div>
        </div>
    </section>

    <section id="projects" class="section">
        <div class="container">
            <h2 class="section-title">Мои проекты</h2>
            <div class="projects-section">
                <div class="projects-grid">
                    <div class="project-card">
                        <h3>Проект 1</h3>
                        <p>Описание вашего первого проекта</p>
                    </div>
                    <div class="project-card">
                        <h3>Проект 2</h3>
                        <p>Описание вашего второго проекта</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="section">
        <div class="container">
            <h2 class="section-title">Связаться со мной</h2>
            <div class="contact-section">
                <div class="contact-buttons">
                    <a href="https://t.me/kdevwp" class="contact-button">
                        <i class="fab fa-telegram"></i>
                        <span>t.me@kdevwp</span>
                    </a>
                    <a href="https://discord.com/users/663006385554063380" class="contact-button">
                        <i class="fab fa-discord"></i>
                        <span>discord.com@cvtzxv</span>
                    </a>
                    <a href="https://github.com/kdevwp" class="contact-button">
                        <i class="fab fa-github"></i>
                        <span>github.com@kdevwp</span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const createFloatingLights = () => {
            const background = document.querySelector('.background');
            const lights = document.createDocumentFragment();
            
            for (let i = 0; i < 15; i++) {
                const light = document.createElement('div');
                light.className = 'floating-light';
                light.style.left = `${Math.random() * 100}vw`;
                light.style.top = `${Math.random() * 100}vh`;
                light.style.animationDelay = `${Math.random() * 15}s`;
                lights.appendChild(light);
            }
            
            background.appendChild(lights);
        };

        const revealSections = () => {
            const sections = document.querySelectorAll('.section');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            sections.forEach(section => observer.observe(section));
        };

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        window.addEventListener('load', createFloatingLights);
        window.addEventListener('DOMContentLoaded', revealSections);
    </script>
</body>
</html>
