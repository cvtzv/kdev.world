<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.cvt roflannov - Happy New Year.</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            background: linear-gradient(to bottom, #003366, #001f4d);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }
        .tree {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        #message {
            font-size: 1.5rem;
            margin: 0.5rem 0;
        }
        #countdown {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            font-size: 1.5rem;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% {
                transform: translateY(-100px);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0.5;
            }
        }
        @media (max-width: 768px) {
            .tree {
                font-size: 4rem;
            }
            #message {
                font-size: 1.2rem;
            }
            #countdown {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="tree">🎄</div>
    <div id="message">С наступающим новым 2025 годом! Осталось:</div>
    <div id="countdown">--:--:--</div>

    <script>
        const snowflakeCount = 50;
        let activeSnowflakes = 0;

        function createSnowflake() {
            if (activeSnowflakes >= snowflakeCount) return;

            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            snowflake.textContent = '*';
            snowflake.style.left = `${Math.random() * 100}vw`;
            snowflake.style.animationDuration = `${Math.random() * 3 + 2}s`;
            snowflake.style.fontSize = `${Math.random() * 10 + 10}px`;
            document.body.appendChild(snowflake);
            activeSnowflakes++;

            snowflake.addEventListener('animationend', () => {
                snowflake.remove();
                activeSnowflakes--;
            });
        }

        setInterval(createSnowflake, 200);

        const countdownElement = document.getElementById('countdown');

        function updateCountdown() {
            const targetDate = new Date('2025-01-01T00:00:00+03:00');
            const currentDate = new Date();
            const difference = targetDate - currentDate;

            if (difference <= 0) {
                document.getElementById('message').textContent = 'С новым 2025 годом!';
                countdownElement.textContent = '';
                document.title = 'С новым 2025 годом!';
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((difference / (1000 * 60)) % 60);
            const seconds = Math.floor((difference / 1000) % 60);

            countdownElement.textContent = `${days}д ${hours}ч ${minutes}м ${seconds}с`;
            document.title = `.cvt roflannov - Happy New Year.`; 
        }

        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
