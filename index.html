<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kdev.world - portfolio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        :root {
            --bg-primary: #0f0f19;
            --bg-secondary: #181830;
            --text-primary: #e5e7eb;
            --accent-primary: #6ee7b7;
            --accent-secondary: #4f46e5;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.6;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }

        .glass-morphism {
            background: rgba(24, 24, 48, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        #music-controls {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 300px;
            background-color: rgba(24, 24, 48, 0.95);
            border-radius: 16px;
            padding: 16px;
            transform: translateY(calc(100% + 100px));
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(110, 231, 183, 0.15);
            pointer-events: none;
        }

        #music-controls.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        #music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 5px 20px rgba(110, 231, 183, 0.3);
            transition: all 0.3s ease;
        }

        #music-toggle:active {
            transform: scale(0.95);
        }

        #music-toggle i {
            transition: transform 0.3s ease;
            font-size: 1.2rem;
        }

        #music-toggle.active i {
            transform: rotate(180deg);
        }

        #progress-bar {
            -webkit-appearance: none;
            height: 5px;
            background: rgba(51, 65, 85, 0.8);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        #progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 5px rgba(110, 231, 183, 0.5);
        }

        #progress-bar:hover::-webkit-slider-thumb {
            opacity: 1;
        }

        .hover-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hover-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(110, 231, 183, 0.2);
        }

        .neon-text {
            text-shadow: 
                0 0 5px var(--accent-primary),
                0 0 15px var(--accent-primary);
        }

        .skill-progress {
            transition: width 1.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .volume-slider {
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #334155;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
            box-shadow: 0 0 5px rgba(110, 231, 183, 0.5);
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.65, 0, 0.35, 1), visibility 0.8s;
        }

        .loader-content {
            text-align: center;
            transform: translateY(-20px);
        }

        .loader-logo {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            color: var(--accent-primary);
            text-shadow: 0 0 15px rgba(110, 231, 183, 0.6);
            animation: pulse 2s infinite ease-in-out;
        }

        .loader-bar-container {
            width: 80%;
            max-width: 280px;
            height: 4px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .loader-text {
            color: var(--text-primary);

            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        #join-btn {

            color: white;

            border-radius: 50px;

            cursor: pointer;

            position: relative;
            overflow: hidden;

        #join-btn:hover {

            box-shadow: 0 8px 25px rgba(110, 231, 183, 0.4);
        }

            transform: translateY(-1px);
        }

        #join-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s ease;
        }

        #join-btn:hover::after {
            transform: translateX(0);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader-content > * {

        }

        .loader-logo {
            animation-delay: 0.1s;
        }

        .loader-text {
            animation-delay: 0.3s;
        }

        .loader-bar-container {
            animation-delay: 0.5s;
        }

        #join-btn {
            animation-delay: 0.7s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .floating {
            animation: float 4s ease-in-out infinite;
        }

        .tag {

        .tag:hover {
            transform: translateY(-2px);

        .social-link::after {

            left: 0;
            width: 0;

        .social-link:hover::after {

        }

        .control-btn {

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(2px);
            z-index: -1;
        }
    </style>

<script>
let tracks = [];
let currentTrackIndex = 0;
let audio = new Audio();
let isMusicPlaying = false;
let isMusicControlsVisible = false;
let isShuffleOn = false;
let isRepeatOn = false;
let isSeeking = false;

const loader = document.getElementById('loader');
const progressBar = document.getElementById('progress');
const joinBtn = document.getElementById('join-btn');
const volumeControl = document.getElementById('volume-control');
const playPauseIcon = document.getElementById('play-pause-icon');
const musicControls = document.getElementById('music-controls');
const currentTrackDisplay = document.getElementById('current-track');
const musicToggle = document.getElementById('music-toggle');

async function loadTracks() {
  try {
    const response = await fetch('tracks.json?t=' + Date.now());
    
    if (!response.ok) throw new Error('Network response was not ok');
    
    const contentType = response.headers.get('content-type');
    if (!contentType || !contentType.includes('application/json')) {
      throw new TypeError('Response is not JSON');
    }
    
    tracks = await response.json();
    
    if (!Array.isArray(tracks) || tracks.length === 0) {
      throw new Error('Empty or invalid tracks array');
    }
  } catch (error) {
    console.error('Failed to load tracks:', error);
    tracks = [{ "name": "Юпи - Никогда не умел", "src": "/src/tracks/Юпи - Никогда не умел.mp3" }];
  } finally {
    initPlayer();
  }
}

function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

function toggleMusicControls() {
    isMusicControlsVisible = !isMusicControlsVisible;
    musicControls.classList.toggle('active', isMusicControlsVisible);
    musicToggle.classList.toggle('active', isMusicControlsVisible);
}

async function checkTrackExists(url) {
  try {
    if (url.startsWith('http')) return true;
    const response = await fetch(url, { method: 'HEAD' });
    return response.ok;
  } catch {
    return false;
  }
}

function nextTrack() {
    let newIndex;
    if (isShuffleOn) {
        do {
            newIndex = Math.floor(Math.random() * tracks.length);
        } while (newIndex === currentTrackIndex && tracks.length > 1);
    } else {
        newIndex = (currentTrackIndex + 1) % tracks.length;
    }
    changeTrack(newIndex);
}

function prevTrack() {
    let newIndex;
    if (isShuffleOn) {
        do {
            newIndex = Math.floor(Math.random() * tracks.length);
        } while (newIndex === currentTrackIndex && tracks.length > 1);
    } else {
        newIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
    }
    changeTrack(newIndex);
}

function changeTrack(index) {
    currentTrackIndex = index;
    initPlayer();
}

async function initPlayer() {
    if (!tracks.length) return;
    
    audio.removeEventListener('ended', handleTrackEnd);
    audio.removeEventListener('timeupdate', updateProgress);
    audio.removeEventListener('loadedmetadata', updateDuration);

    const trackExists = await checkTrackExists(tracks[currentTrackIndex].src);
    if (!trackExists) {
        console.warn(`Track not found: ${tracks[currentTrackIndex].src}`);
        return nextTrack();
    }
    
    audio.src = tracks[currentTrackIndex].src;
    audio.volume = volumeControl.value / 100;
    
    try {
        await audio.load();
        
        audio.addEventListener('loadedmetadata', updateDuration);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', handleTrackEnd);
        
        updateTrackInfo();
        
        if (isMusicPlaying) {
            await audio.play();
        }
    } catch (error) {
        console.error('Error loading audio:', error);
        nextTrack();
    }
}

function handleTrackEnd() {
    if (isRepeatOn) {
        audio.currentTime = 0;
        audio.play().catch(console.error);
    } else {
        nextTrack();
    }
}

function updateDuration() {
    const totalTimeElement = document.getElementById('total-time');
    if (!isNaN(audio.duration)) {
        totalTimeElement.textContent = formatTime(audio.duration);
    }
}

function updateTrackInfo() {
    currentTrackDisplay.textContent = `${currentTrackIndex + 1}/${tracks.length}: ${tracks[currentTrackIndex].name}`;
    document.getElementById('current-time').textContent = "0:00";
    document.getElementById('progress-bar').value = 0;
    playPauseIcon.className = isMusicPlaying ? 'fas fa-pause' : 'fas fa-play';
}

function updateProgress() {
    if (!isSeeking && audio.duration) {
        const progressPercent = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress-bar').value = progressPercent;
        document.getElementById('current-time').textContent = formatTime(audio.currentTime);
    }
}

function seekTrack(e) {
    isSeeking = true;
    const seekTime = (e.target.value / 100) * (audio.duration || 0);
    
    if (isFinite(seekTime)) {
        document.getElementById('current-time').textContent = formatTime(seekTime);
    }
    
    const handleSeekEnd = () => {
        if (isFinite(seekTime)) {
            audio.currentTime = seekTime;
        }
        isSeeking = false;
    };
    
    e.target.addEventListener('mouseup', handleSeekEnd, { once: true });
    e.target.addEventListener('touchend', handleSeekEnd, { once: true });
}

function togglePlay() {
    if (audio.paused) {
        audio.play()
            .then(() => {
                isMusicPlaying = true;
                playPauseIcon.className = 'fas fa-pause';
            })
            .catch(e => {
                console.error("Play failed:", e);
                isMusicPlaying = false;
                playPauseIcon.className = 'fas fa-play';
            });
    } else {
        audio.pause();
        isMusicPlaying = false;
        playPauseIcon.className = 'fas fa-play';
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadTracks();
    
    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.random() * 15;
