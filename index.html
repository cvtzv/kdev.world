<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kdev.world</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            font-weight: bold;
            border: 4px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
            background-size: cover;
            background-position: center;
            object-fit: cover;
        }

        .avatar:hover {
            transform: scale(1.1);
        }

        .name {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .social-link {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .player {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .track-info {
            color: white;
            margin-bottom: 15px;
        }

        .track-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .track-artist {
            font-size: 14px;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .time {
            color: white;
            font-size: 12px;
            opacity: 0.8;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress {
            height: 100%;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            width: 0%;
            transition: width 0.1s;
        }

        .track-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            padding: 5px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .nav-btn:hover {
            opacity: 1;
        }

        .track-list {
            font-size: 12px;
            color: white;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar" style="background-image: url('/src/avatar.jpg');"></div>
        <div class="name">квтишка</div>
        
        <div class="social-links">
            <a href="#" class="social-link">🐙</a>
            <a href="#" class="social-link">📱</a>
            <a href="#" class="social-link">🎵</a>
            <a href="#" class="social-link">📧</a>
        </div>

        <div class="player">
            <div class="track-info">
                <div class="track-title" id="trackTitle">Загрузка...</div>
                <div class="track-artist" id="trackArtist">Исполнитель</div>
            </div>
            
            <div class="controls">
                <button class="play-btn" id="playBtn">▶</button>
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress"></div>
                </div>
                <span class="time" id="duration">0:00</span>
            </div>

            <div class="track-nav">
                <button class="nav-btn" id="prevBtn">⏮</button>
                <div class="track-list">
                    <span id="currentTrack">1</span> / <span id="totalTracks">0</span>
                </div>
                <button class="nav-btn" id="nextBtn">⏭</button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        class MusicPlayer {
            constructor() {
                this.audio = document.getElementById('audio');
                this.playBtn = document.getElementById('playBtn');
                this.prevBtn = document.getElementById('prevBtn');
                this.nextBtn = document.getElementById('nextBtn');
                this.progressBar = document.getElementById('progressBar');
                this.progress = document.getElementById('progress');
                this.currentTime = document.getElementById('currentTime');
                this.duration = document.getElementById('duration');
                this.trackTitle = document.getElementById('trackTitle');
                this.trackArtist = document.getElementById('trackArtist');
                this.currentTrack = document.getElementById('currentTrack');
                this.totalTracks = document.getElementById('totalTracks');
                
                this.tracks = [];
                this.currentIndex = 0;
                this.isPlaying = false;
                
                this.init();
            }

            async init() {
                await this.loadTracks();
                this.setupEventListeners();
                if (this.tracks.length > 0) {
                    this.loadTrack(0);
                }
            }

            async loadTracks() {
                try {
                    const response = await fetch('/tracks.json');
                    if (!response.ok) {
                        throw new Error('Не удалось загрузить файл треков');
                    }
                    this.tracks = await response.json();
                    
                    this.parseTrackInfo();
                    this.totalTracks.textContent = this.tracks.length;
                } catch (error) {
                    console.error('Ошибка загрузки треков:', error);
                    this.tracks = [
                        { name: "auratoshi - sil2nt hill", src: "src/tracks/16. auratoshi - sil2nt hill.mp3" }
                    ];
                    this.parseTrackInfo();
                    this.totalTracks.textContent = this.tracks.length;
                }
            }

            parseTrackInfo() {
                this.tracks = this.tracks.map(track => {
                    const parts = track.name.split(' - ');
                    return {
                        title: parts.length > 1 ? parts.slice(1).join(' - ') : track.name,
                        artist: parts.length > 1 ? parts[0] : 'Неизвестный исполнитель',
                        src: track.src
                    };
                });
            }

            setupEventListeners() {
                this.playBtn.addEventListener('click', () => this.togglePlay());
                this.prevBtn.addEventListener('click', () => this.previousTrack());
                this.nextBtn.addEventListener('click', () => this.nextTrack());
                this.progressBar.addEventListener('click', (e) => this.seek(e));
                
                this.audio.addEventListener('timeupdate', () => this.updateProgress());
                this.audio.addEventListener('ended', () => this.nextTrack());
                this.audio.addEventListener('loadedmetadata', () => this.updateDuration());
                this.audio.addEventListener('error', (e) => {
                    console.error('Ошибка загрузки аудио:', e);
                    this.trackTitle.textContent = 'Ошибка загрузки';
                    this.trackArtist.textContent = 'Файл не найден';
                });
            }

            loadTrack(index) {
                if (index >= 0 && index < this.tracks.length) {
                    this.currentIndex = index;
                    const track = this.tracks[index];
                    
                    this.audio.src = track.src;
                    this.trackTitle.textContent = track.title;
                    this.trackArtist.textContent = track.artist;
                    this.currentTrack.textContent = index + 1;
                    
                    this.progress.style.width = '0%';
                    this.currentTime.textContent = '0:00';
                    this.duration.textContent = '0:00';
                }
            }

            togglePlay() {
                if (this.isPlaying) {
                    this.audio.pause();
                    this.playBtn.textContent = '▶';
                } else {
                    this.audio.play().catch(e => {
                        console.error('Ошибка воспроизведения:', e);
                        this.trackTitle.textContent = 'Ошибка воспроизведения';
                    });
                    this.playBtn.textContent = '⏸';
                }
                this.isPlaying = !this.isPlaying;
            }

            previousTrack() {
                const newIndex = this.currentIndex > 0 ? this.currentIndex - 1 : this.tracks.length - 1;
                this.loadTrack(newIndex);
                if (this.isPlaying) {
                    this.audio.play().catch(e => console.error('Ошибка воспроизведения:', e));
                }
            }

            nextTrack() {
                const newIndex = this.currentIndex < this.tracks.length - 1 ? this.currentIndex + 1 : 0;
                this.loadTrack(newIndex);
                if (this.isPlaying) {
                    this.audio.play().catch(e => console.error('Ошибка воспроизведения:', e));
                }
            }

            seek(e) {
                const rect = this.progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                this.audio.currentTime = percent * this.audio.duration;
            }

            updateProgress() {
                if (this.audio.duration) {
                    const percent = (this.audio.currentTime / this.audio.duration) * 100;
                    this.progress.style.width = percent + '%';
                    this.currentTime.textContent = this.formatTime(this.audio.currentTime);
                }
            }

            updateDuration() {
                if (this.audio.duration) {
                    this.duration.textContent = this.formatTime(this.audio.duration);
                }
            }

            formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        new MusicPlayer();
    </script>
</body>
</html>
