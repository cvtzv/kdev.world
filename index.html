<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.cvt roflannov - Main.</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            background: linear-gradient(to bottom, #003366, #001f4d);
            overflow-x: hidden;
        }
        header {
            text-align: center;
            padding: 2rem 1rem;
            background: rgba(0, 51, 102, 0.8);
        }
        header h1 {
            font-size: 2.5rem;
            margin: 0;
        }
        header p {
            font-size: 1.2rem;
            margin: 0.5rem 0 0;
        }
        .tree {
            margin: 2rem auto;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #28a745, #155724);
            border-radius: 50% 50% 0 0;
            position: relative;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: shine 2s infinite;
        }
        .tree:before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 50px;
            background: #8b4513;
        }
        @keyframes shine {
            0%, 100% {
                box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            }
            50% {
                box-shadow: 0 0 20px #fff, 0 0 40px #fff;
            }
        }
        #countdown {
            font-size: 1.5rem;
            margin: 1rem 0;
        }
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            font-size: 1.5rem;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% {
                transform: translateY(-100px);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0.5;
            }
        }
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }
            #countdown {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="tree"></div>
        <div id="countdown">Time left: --:--:--:--</div>
        <h1>Happy New Year!</h1>
    </header>

    <script>
        const snowflakeCount = 50;

        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            snowflake.textContent = '*';
            snowflake.style.left = `${Math.random() * 100}vw`;
            snowflake.style.animationDuration = `${Math.random() * 3 + 2}s`;
            snowflake.style.fontSize = `${Math.random() * 10 + 10}px`;
            document.body.appendChild(snowflake);

            snowflake.addEventListener('animationend', () => {
                snowflake.remove();
            });
        }

        setInterval(createSnowflake, 200);

        const countdownElement = document.getElementById('countdown');

        function updateCountdown() {
            const targetDate = new Date('2025-01-01T00:00:00+03:00');
            const currentDate = new Date();
            const difference = targetDate - currentDate;

            if (difference <= 0) {
                countdownElement.textContent = 'Happy New Year!';
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((difference / (1000 * 60)) % 60);
            const seconds = Math.floor((difference / 1000) % 60);

            countdownElement.textContent = `Time left: ${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
