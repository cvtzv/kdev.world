<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kdev.world</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 20%, #ff006e 0%, transparent 50%), 
                       radial-gradient(circle at 70% 80%, #8338ec 0%, transparent 50%),
                       radial-gradient(circle at 50% 50%, #3a86ff 0%, transparent 50%);
            opacity: 0.1;
            animation: pulse 8s ease-in-out infinite alternate;
        }
        
        @keyframes pulse {
            0% { opacity: 0.1; transform: scale(1); }
            100% { opacity: 0.2; transform: scale(1.05); }
        }
        
        .container {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 450px;
            width: 90%;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            z-index: 1;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            font-weight: 700;
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        
        .avatar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .avatar:hover { transform: scale(1.05) rotate(5deg); }
        
        .name {
            color: #ffffff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .social-link {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 24px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }
        
        .social-link:hover::before { left: 100%; }
        .social-link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }
        
        .player {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }
        
        .track-info {
            color: white;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .track-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }
        
        .track-artist {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .play-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(255, 0, 110, 0.3);
        }
        
        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(255, 0, 110, 0.4);
        }
        
        .time {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            font-weight: 500;
            min-width: 35px;
        }
        
        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: height 0.2s;
        }
        
        .progress-bar:hover { height: 8px; }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
            width: 0%;
            transition: width 0.1s;
            border-radius: 10px;
        }
        
        .track-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .track-list {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar" style="background-image: url('/src/avatar.jpg');"></div>
        <div class="name">квтишка</div>
        
        <div class="social-links">
            <a href="#" class="social-link">🐙</a>
            <a href="#" class="social-link">📱</a>
            <a href="#" class="social-link">🎵</a>
            <a href="#" class="social-link">📧</a>
        </div>

        <div class="player">
            <div class="track-info">
                <div class="track-title" id="trackTitle">Загрузка...</div>
                <div class="track-artist" id="trackArtist">Исполнитель</div>
            </div>
            
            <div class="controls">
                <button class="play-btn" id="playBtn">▶</button>
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress"></div>
                </div>
                <span class="time" id="duration">0:00</span>
            </div>

            <div class="track-nav">
                <button class="nav-btn" id="prevBtn">⏮</button>
                <div class="track-list">
                    <span id="currentTrack">1</span> / <span id="totalTracks">0</span>
                </div>
                <button class="nav-btn" id="nextBtn">⏭</button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('Service Worker зарегистрирован:', registration);
                    })
                    .catch(error => {
                        console.error('Ошибка при регистрации Service Worker:', error);
                    });
            });
        }
    </script>
    
    <script>
        class MusicPlayer {
            constructor() {
                this.audio = document.getElementById('audio');
                this.playBtn = document.getElementById('playBtn');
                this.prevBtn = document.getElementById('prevBtn');
                this.nextBtn = document.getElementById('nextBtn');
                this.progressBar = document.getElementById('progressBar');
                this.progress = document.getElementById('progress');
                this.currentTime = document.getElementById('currentTime');
                this.duration = document.getElementById('duration');
                this.trackTitle = document.getElementById('trackTitle');
                this.trackArtist = document.getElementById('trackArtist');
                this.currentTrack = document.getElementById('currentTrack');
                this.totalTracks = document.getElementById('totalTracks');
                this.tracks = [];
                this.currentIndex = 0;
                this.isPlaying = false;
                this.init();
            }

            async init() {
                await this.loadTracks();
                this.setupEventListeners();
                if (this.tracks.length > 0) this.loadTrack(0);
            }

            async loadTracks() {
                try {
                    const response = await fetch('/tracks.json');
                    if (!response.ok) throw new Error('Не удалось загрузить файл треков');
                    this.tracks = await response.json();
                    this.parseTrackInfo();
                    this.totalTracks.textContent = this.tracks.length;
                } catch (error) {
                    console.error('Ошибка загрузки треков:', error);
                    this.tracks = [{ name: "auratoshi - sil2nt hill", src: "src/tracks/16. auratoshi - sil2nt hill.mp3" }];
                    this.parseTrackInfo();
                    this.totalTracks.textContent = this.tracks.length;
                }
            }

            parseTrackInfo() {
                this.tracks = this.tracks.map(track => {
                    const parts = track.name.split(' - ');
                    return {
                        title: parts.length > 1 ? parts.slice(1).join(' - ') : track.name,
                        artist: parts.length > 1 ? parts[0] : 'Неизвестный исполнитель',
                        src: track.src
                    };
                });
            }

            setupEventListeners() {
                this.playBtn.addEventListener('click', () => this.togglePlay());
                this.prevBtn.addEventListener('click', () => this.previousTrack());
                this.nextBtn.addEventListener('click', () => this.nextTrack());
                this.progressBar.addEventListener('click', (e) => this.seek(e));
                this.audio.addEventListener('timeupdate', () => this.updateProgress());
                this.audio.addEventListener('ended', () => this.nextTrack());
                this.audio.addEventListener('loadedmetadata', () => this.updateDuration());
                this.audio.addEventListener('error', (e) => {
                    console.error('Ошибка загрузки аудио:', e);
                    this.trackTitle.textContent = 'Ошибка загрузки';
                    this.trackArtist.textContent = 'Файл не найден';
                });
            }

            loadTrack(index) {
                if (index >= 0 && index < this.tracks.length) {
                    this.currentIndex = index;
                    const track = this.tracks[index];
                    this.audio.src = track.src;
                    this.trackTitle.textContent = track.title;
                    this.trackArtist.textContent = track.artist;
                    this.currentTrack.textContent = index + 1;
                    this.progress.style.width = '0%';
                    this.currentTime.textContent = '0:00';
                    this.duration.textContent = '0:00';
                }
            }

            togglePlay() {
                if (this.isPlaying) {
                    this.audio.pause();
                    this.playBtn.textContent = '▶';
                } else {
                    this.audio.play().catch(e => {
                        console.error('Ошибка воспроизведения:', e);
                        this.trackTitle.textContent = 'Ошибка воспроизведения';
                    });
                    this.playBtn.textContent = '⏸';
                }
                this.isPlaying = !this.isPlaying;
            }

            previousTrack() {
                const newIndex = this.currentIndex > 0 ? this.currentIndex - 1 : this.tracks.length - 1;
                this.loadTrack(newIndex);
                if (this.isPlaying) this.audio.play().catch(e => console.error('Ошибка воспроизведения:', e));
            }

            nextTrack() {
                const newIndex = this.currentIndex < this.tracks.length - 1 ? this.currentIndex + 1 : 0;
                this.loadTrack(newIndex);
                if (this.isPlaying) this.audio.play().catch(e => console.error('Ошибка воспроизведения:', e));
            }

            seek(e) {
                const rect = this.progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                this.audio.currentTime = percent * this.audio.duration;
            }

            updateProgress() {
                if (this.audio.duration) {
                    const percent = (this.audio.currentTime / this.audio.duration) * 100;
                    this.progress.style.width = percent + '%';
                    this.currentTime.textContent = this.formatTime(this.audio.currentTime);
                }
            }

            updateDuration() {
                if (this.audio.duration) this.duration.textContent = this.formatTime(this.audio.duration);
            }

            formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        new MusicPlayer();
    </script>
</body>
</html>
