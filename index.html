<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.kdev.world - reboot.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }
        
        .desktop-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1000;
            color: #ff0000;
            text-align: center;
            padding: 20% 5%;
            font-size: 24px;
            font-weight: bold;
        }
        
        .mobile-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
        }
        
        #background-video {
            position: absolute;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="desktop-warning" id="desktop-warning">
        <h1>Доступ запрещен</h1>
        <p>Этот сайт доступен только с мобильных устройств.</p>
        <p>Пожалуйста, используйте телефон или планшет для доступа к этому содержимому.</p>
    </div>

    <div class="mobile-content" id="mobile-content">
        <video id="background-video" autoplay loop muted playsinline>
            <source src="https://qitmyrzlznmdmkaxjosy.supabase.co/storage/v1/object/public/media/media/1740123146132_agxgd6um7.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function isMobileDevice() {
                return (window.innerWidth <= 800) || 
                       (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent));
            }

            function checkDevice() {
                if (!isMobileDevice()) {
                    document.getElementById('desktop-warning').style.display = 'block';
                    document.getElementById('mobile-content').style.display = 'none';
                } else {
                    document.getElementById('desktop-warning').style.display = 'none';
                    document.getElementById('mobile-content').style.display = 'block';
                    
                    var video = document.getElementById('background-video');
                    video.play();
                }
            }

            checkDevice();

            window.addEventListener('resize', checkDevice);
        });
    </script>
</body>
</html>
