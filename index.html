<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.cvt roflannov - Happy New Year.</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            background: linear-gradient(to bottom, #003366, #001f4d);
            overflow-x: hidden;
        }
        header {
            text-align: center;
            padding: 2rem 1rem;
            background: rgba(0, 51, 102, 0.8);
        }
        header h1 {
            font-size: 2.5rem;
            margin: 0;
        }
        header p {
            font-size: 1.2rem;
            margin: 0.5rem 0 0;
        }
        .tree {
            margin: 2rem auto;
            width: 0;
            height: 0;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            border-bottom: 150px solid #28a745;
            position: relative;
        }
        .tree:before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid #28a745;
        }
        .tree:after {
            content: '';
            position: absolute;
            top: -100px;
            left: -25px;
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid #28a745;
        }
        .tree-trunk {
            width: 30px;
            height: 50px;
            background: #8b4513;
            margin: 0 auto;
        }
        #countdown {
            font-size: 1.5rem;
            margin: 1rem 0;
        }
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            font-size: 1.5rem;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% {
                transform: translateY(-100px);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0.5;
            }
        }
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }
            #countdown {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="tree"></div>
        <div class="tree-trunk"></div>
        <div id="countdown">До Нового года осталось: --:--:--:--</div>
        <h1>С Новым годом!</h1>
    </header>

    <script>
        const snowflakeCount = 50;
        let activeSnowflakes = 0;

        function createSnowflake() {
            if (activeSnowflakes >= snowflakeCount) return;

            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            snowflake.textContent = '*';
            snowflake.style.left = `${Math.random() * 100}vw`;
            snowflake.style.animationDuration = `${Math.random() * 3 + 2}s`;
            snowflake.style.fontSize = `${Math.random() * 10 + 10}px`;
            document.body.appendChild(snowflake);
            activeSnowflakes++;

            snowflake.addEventListener('animationend', () => {
                snowflake.remove();
                activeSnowflakes--;
            });
        }

        setInterval(createSnowflake, 200);

        const countdownElement = document.getElementById('countdown');

        function updateCountdown() {
            const targetDate = new Date('2025-01-01T00:00:00+03:00');
            const currentDate = new Date();
            const difference = targetDate - currentDate;

            if (difference <= 0) {
                countdownElement.textContent = 'С Новым годом!';
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((difference / (1000 * 60)) % 60);
            const seconds = Math.floor((difference / 1000) % 60);

            countdownElement.textContent = `До Нового года осталось: ${days}д ${hours}ч ${minutes}м ${seconds}с`;
        }

        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
